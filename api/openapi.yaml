    EnhancedRegion:
      example:
        createdAt: 2000-01-23T04:56:07.000+00:00
        scaleUnits: 1
        tenantId: tenantId
        name: name
        dns: dns
        attributes:
          edge:
            addresses:
            - addresses
            - addresses
            globalIPs:
            - globalIPs
            - globalIPs
          runningMode:
            idle: true
        id: id
        network: network
        updatedAt: 2000-01-23T04:56:07.000+00:00
      properties:
        id:
          description: ID for the enhanced region.
          type: string
        tenantId:
          description: ID of the tenant that owns the region.
