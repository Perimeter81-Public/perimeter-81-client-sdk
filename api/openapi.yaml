    The Enhanced Network API allows you to manage and configure enhanced networks.
  name: Enhanced Networks
- description: |
    The Enhanced Region API allows you to manage and configure enhanced regions, including scale units.
  name: Enhanced Regions
- description: |
    The Enhanced Tunnel API allows you to manage and configure enhanced tunnels.
  name: Enhanced Tunnels
- description: |
    The Enhanced Route Tables API allows you to manage and configure enhanced route tables of static and dynamic tunnels.
  name: Enhanced Route Tables
- description: |
    The Standard Network API allows you to manage and configure standard networks.
  name: Standard Networks
- name: Gateways
- name: Regions
- name: Wireguard
- name: OpenVPN
- name: IPSec-Single
- name: IPSec-Redundant
- name: Firewall Policy
- name: Route Table
- name: Objects Services
- name: Application
- description: |
    This API allows you to manage and configure standard networks using the old API and keep you BC.
  name: Networks
