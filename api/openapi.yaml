    regionId:
      explode: false
      in: path
      name: regionId
      required: true
      schema:
        type: string
      style: simple
    tunnelId:
      explode: false
      in: path
      name: tunnelId
      required: true
      schema:
        type: string
      style: simple
    dynamicTunnelId:
      explode: false
      in: path
      name: dynamicTunnelId
      required: true
      schema:
        type: string
      style: simple
    routeId:
      explode: false
      in: path
      name: routeId
      required: true
      schema:
        type: string
      style: simple
    networkIdParam:
      explode: false
      in: path
      name: networkId
      required: true
      schema:
        type: string
      style: simple
    tunnelIdParam:
      explode: false
      in: path
      name: tunnelId
      required: true
      schema:
        type: string
      style: simple
    haTunnelIdParam:
      explode: false
      in: path
      name: haTunnelId
      required: true
      schema:
        type: string
      style: simple
  responses:
    "202":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AsyncOperationResponse"
      description: Request accepted
    "401":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Unauthorized
    "402":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Insufficient licenses
    "403":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Forbidden
    "404":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Resource not found
    "422":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Unprocessable entity
    "401_Unauthorized":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Unauthorized
    "403_Forbidden":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Forbidden
    "202_Accepted":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AsyncOperationResponse"
      description: Request accepted
    "400_BadRequest":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Bad Request
    "402_Insufficient_licenses":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Insufficient licenses
    "404_NotFound":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Resource not found
    "422_UnprocessableEntity":
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
      description: Unprocessable entity
  schemas:
    BaseDates:
      additionalProperties: false
      properties:
        createdAt:
          description: The date when this record was created.
          format: date-time
          type: string
        updatedAt:
          description: The date of last update of the record.
          format: date-time
          type: string
      required:
      - createdAt
      type: object
    ASN:
      description: Autonomous System Number (ASN) for BGP routing. It will be automatically
        assigned an ASN once creating the first dynamic tunnel in this network. The
        network ASN can never be changed once it is set.
      type: integer
    TunnelAuthConfig:
      properties:
        authType:
          description: "Authentication type for tunnel (psk for pre-shared key, cert\
            \ for certificate)"
          enum:
          - psk
          - cert
          type: string
        passphrase:
          description: Pre-shared key for tunnel authentication (8-64 characters).
            Required when authType is psk.
          maxLength: 64
          minLength: 8
          type: string
        customerRootCA:
          description: Customer root certificate authority. Required when authType
            is cert.
          type: string
      type: object
    BasicNetwork:
      allOf:
      - $ref: "#/components/schemas/BaseDates"
      - properties:
          dns:
            description: DNS of the network.
            type: string
          subnet:
            description: Subnet of the network.
            type: string
          accessType:
            enum:
            - public
            - private
            type: string
          applications:
            description: List of IDs of assigned applications.
            items:
              type: string
            type: array
          tags:
            description: List of network tags.
            items:
              type: string
            type: array
          name:
            description: Network name.
            type: string
          isDefault:
            description: Indicates that the network is default.
            type: boolean
          id:
            description: Unique ID.
            type: string
          tenantId:
            description: ID of the tenant.
            type: string
          asn:
            $ref: "#/components/schemas/ASN"
        required:
        - accessType
        - applications
        - dns
        - id
        - isDefault
        - name
        - subnet
        - tags
        - tenantId
        type: object
    EnhancedNetwork:
      allOf:
      - $ref: "#/components/schemas/BasicNetwork"
      - properties:
          attributes:
            $ref: "#/components/schemas/Attributes"
        type: object
      example:
        subnet: subnet
        dns: dns
        tags:
        - tags
        - tags
        accessType: public
        createdAt: 2000-01-23T04:56:07.000+00:00
        isDefault: true
        name: name
        tenantId: tenantId
        attributes:
          dnsFiltering:
            enabled: true
          customDNS:
            enabled: true
          networkController:
            enabled: true
          splitTunneling:
            enabled: true
          openVPNTCP:
            enabled: true
        id: id
        asn: null
        updatedAt: 2000-01-23T04:56:07.000+00:00
        applications:
        - applications
        - applications
    Error:
      example:
        id: id
        message: message
      properties:
        id:
          type: string
        message:
          type: string
      type: object
    EnhancedRegionCreate:
      example:
        idle: true
        scaleUnits: ""
        harmonySaseRegionId: harmonySaseRegionId
      properties:
        harmonySaseRegionId:
          description: "Harmony SASE region ID, Take id from GET Harmony sases regions\
            \ endpoint (/networks/enhanced/harmony-sase-regions)."
          type: string
        scaleUnits:
          allOf:
          - $ref: "#/components/schemas/ScaleUnitsCount"
          default: 1
        idle:
          default: true
          description: Region is disabled for users if true
          type: boolean
      required:
      - harmonySaseRegionId
      type: object
    DeployEnhancedNetwork:
      example:
        regions:
        - idle: true
          scaleUnits: ""
          harmonySaseRegionId: harmonySaseRegionId
        - idle: true
          scaleUnits: ""
          harmonySaseRegionId: harmonySaseRegionId
        network:
          subnet: 10.255.0.0/16
          name: name
          tags:
          - tags
          - tags
      properties:
        network:
          $ref: "#/components/schemas/DeployEnhancedNetwork_network"
        regions:
          items:
            $ref: "#/components/schemas/EnhancedRegionCreate"
          minItems: 1
          type: array
      required:
      - network
