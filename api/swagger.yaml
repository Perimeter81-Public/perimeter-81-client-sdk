    AlphanumericWithSpace:
      type: string
      pattern: ^[a-zA-Z0-9 ]+$
      description: Any alphanumeric value with space
      minLength: 1
    UsersAndGroups:
      type: object
      properties:
        users:
          items:
            $ref: '#/components/schemas/AlphanumericWithSpace'
          type: array
          minItems: 1
          maxItems: 10
          description: List of IDs of users.
        groups:
          items:
            $ref: '#/components/schemas/AlphanumericWithSpace'
          type: array
          minItems: 1
          description: List of IDs of groups.
      additionalProperties: false
    Addresses:
      type: object
      properties:
        addresses:
          items:
            $ref: '#/components/schemas/AlphanumericWithSpace'
          type: array
          minItems: 1
          description: List of IDs of address objects.
      required:
        - addresses
      additionalProperties: false
    SourcesAndDestinations:
      type: object
      oneOf:
        - $ref: '#/components/schemas/UsersAndGroups'
        - $ref: '#/components/schemas/Addresses'
    FirewallPolicyRule:
      type: object
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/Alphanumeric'
            - description: Policy rule ID.
        name:
          type: string
          minLength: 5
          maxLength: 50
          description: Policy rule ID.
        enabled:
          type: boolean
          description: wether the rule is enabled.
        allowed:
          type: boolean
          description: wether the rule is enabled.
        sources:
          $ref: '#/components/schemas/SourcesAndDestinations'
        destinations:
          $ref: '#/components/schemas/SourcesAndDestinations'
        services:
          items:
            type: string
            pattern: ^[a-zA-Z0-9_- ]+$
          type: array
          minItems: 1
          description: List of services objects IDs.
      required:
        - name
        - enabled
        - allowed
        - sources
        - destinations
      additionalProperties: false
    FirewallPolicy:
      type: object
      properties:
        enabled:
          type: boolean
          description: whether the policy is enabled.
        allowed:
          type: boolean
          description: whether the policy is accept or drop.
        id:
          allOf:
            - $ref: '#/components/schemas/Alphanumeric'
            - description: network policy id
            - example: ZwAeo5wqiF
        policyRules:
          items:
            $ref: '#/components/schemas/FirewallPolicyRule'
          type: array
          description: an array of policy rules.
          required:
            - sources
            - destinations
        trace:
          type: boolean
          description: whether the policy is traced.
      required:
        - enabled
        - allowed
        - id
        - policyRules
      additionalProperties: false
    ObjectsName:
      type: string
      pattern: ^[a-zA-Z0-9_ ]+$
      description: The name of the Objects
      minLength: 3
      maxLength: 100
    PortNumber:
      type: integer
      minimum: 1
      maximum: 65535
    ObjectServiceProtocolSingle:
      type: object
      required:
        - valueType
        - value
      properties:
        valueType:
          type: string
          enum:
            - single
        value:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: '#/components/schemas/PortNumber'
    ObjectServiceProtocolRange:
      type: object
      required:
        - valueType
        - value
      properties:
        valueType:
          type: string
          enum:
            - range
        value:
          type: array
          minItems: 2
          maxItems: 2
          items:
            $ref: '#/components/schemas/PortNumber'
    ObjectServiceProtocolList:
      type: object
      required:
        - valueType
        - value
      properties:
        valueType:
          type: string
          enum:
            - list
        value:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/PortNumber'
    ObjectServiceProtocolTCPUDP:
      oneOf:
        - $ref: '#/components/schemas/ObjectServiceProtocolSingle'
        - $ref: '#/components/schemas/ObjectServiceProtocolRange'
        - $ref: '#/components/schemas/ObjectServiceProtocolList'
      type: object
      required:
        - protocol
      properties:
        protocol:
          type: string
          enum:
            - tcp
            - udp
    ObjectServiceProtocolOptionsICMPresponse:
      description: '-1 means ''any'', the rest of the values are the RFC default ICMP parameters'
      type: object
      properties:
        code:
          type: integer
        description:
          type: string
      enum:
        - code: -1
          description: Any
        - code: 0
          description: Echo Reply
        - code: 3
          description: Destination Unreachable
        - code: 5
          description: Redirect
        - code: 8
          description: Echo
        - code: 9
          description: Router Advertisement
        - code: 10
          description: Router Selection
        - code: 11
          description: Time Exceeded
        - code: 12
          description: Parameter Problem
        - code: 13
          description: Timestamp
        - code: 14
          description: Timestamp Reply
        - code: 40
          description: Photuris
        - code: 42
          description: Extended Echo Request
        - code: 43
          description: Extended Echo Reply
    ObjectServiceProtocolICMPResponse:
      type: object
      required:
        - protocol
        - protocolOptions
      properties:
        protocol:
          type: string
          enum:
            - icmp
        protocolOptions:
          $ref: '#/components/schemas/ObjectServiceProtocolOptionsICMPresponse'
    ObjectsServicesProtocolResponseObj:
      anyOf:
        - $ref: '#/components/schemas/ObjectServiceProtocolTCPUDP'
        - $ref: '#/components/schemas/ObjectServiceProtocolICMPResponse'
    ObjectsServicesResponseObj:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ObjectsName'
        description:
          type: string
        protocols:
          items:
            $ref: '#/components/schemas/ObjectsServicesProtocolResponseObj'
          type: array
      required:
        - name
        - protocols
    NumberPositive500:
      type: number
      minimum: 0
      maximum: 500
    ObjectsPaginationObj:
      type: object
      properties:
        page:
          $ref: '#/components/schemas/NumberPositive500'
        totalPage:
          $ref: '#/components/schemas/NumberPositive500'
        itemsTotal:
          $ref: '#/components/schemas/NumberPositive500'
      required:
        - page
        - totalPage
        - itemsTotal
    ObjectsAddressesResponse:
      allOf:
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: "#/components/schemas/ObjectsAddressObj"
          required:
            - data
        - $ref: "#/components/schemas/ObjectsPaginationObj"
    ObjectsAddressObj:
      required:
        - name
      allOf:
        - type: object
          required:
            - name
          properties:
            id:
              type: string
              description: "Unique Address ID"
            name:
              $ref: "#/components/schemas/ObjectsName"
            description:
              type: string
        - type: object
          oneOf:
            - $ref: "#/components/schemas/ObjectsAddressIP"
            - $ref: "#/components/schemas/ObjectsAddressIPList"
            - $ref: "#/components/schemas/ObjectsAddressCIDR"
            - $ref: "#/components/schemas/ObjectsAddressFQDN"
    ObjectsAddressIP:
      type: object
      required:
        - value
        - valueType
      properties:
        valueType:
          type: string
          enum: [ip]
        value:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/IP"
    ObjectsAddressIPList:
      type: object
      required:
        - value
        - valueType
      properties:
        valueType:
          type: string
          enum: [list]
        value:
          description: "Must be a unique list of IPs"
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/IP"
    ObjectsAddressCIDR:
      type: object
      required:
        - value
        - valueType
      properties:
        valueType:
          type: string
          enum: [cidr]
        value:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/CIDR"
    ObjectsAddressFQDN:
      type: object
      required:
        - value
        - valueType
      properties:
        valueType:
          type: string
          enum: [fqdn]
        value:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: "#/components/schemas/FQDN"
    ObjectsServicesResponse:
      allOf:
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/ObjectsServicesResponseObj'
          required:
            - data
        - $ref: '#/components/schemas/ObjectsPaginationObj'
    ObjectServiceProtocolOptionsICMPrequest:
      description: '-1 means ''any'', the rest of the values are the RFC default ICMP parameters'
      type: integer
      enum:
        - -1
        - 0
        - 3
        - 5
        - 8
        - 9
        - 10
        - 11
        - 12
        - 13
        - 14
        - 40
        - 42
        - 43
    ObjectServiceProtocolICMPRequest:
      type: object
      required:
        - protocol
        - protocolOptions
      properties:
        protocol:
          type: string
          enum:
            - icmp
        protocolOptions:
          $ref: '#/components/schemas/ObjectServiceProtocolOptionsICMPrequest'
    ObjectsServicesProtocolRequestObj:
      anyOf:
        - $ref: '#/components/schemas/ObjectServiceProtocolTCPUDP'
        - $ref: '#/components/schemas/ObjectServiceProtocolICMPRequest'
    ObjectsServicesRequestObj:
      type: object
      properties:
        name:
          $ref: '#/components/schemas/ObjectsName'
        description:
          type: string
        protocols:
          items:
            $ref: '#/components/schemas/ObjectsServicesProtocolRequestObj'
          type: array
      additionalProperties: false
      required:
        - name
        - protocols
    CommonApplication:
      type: object
      properties:
        id:
          type: string
          description: Unique application ID
        name:
          type: string
          description: Application name
        type:
          type: string
          description: Application type
          enum:
            - http
            - https
            - rdp
            - ssh
            - vnc
        enabled:
          type: boolean
          description: Application enabling status
        policy:
          type: object
          description: Application related Policy data
          properties:
            id:
              type: string
              description: Policy Id
            name:
              type: string
              description: Policy name
          required:
            - id
            - name
        createdAt:
          type: string
          description: Application create date
      required:
        - id
        - name
        - type
    ApplicationsListObject:
      allOf:
        - $ref: '#/components/schemas/CommonApplication'
        - type: object
          properties:
            network:
              type: object
              description: Application related Network data
              properties:
                id:
                  type: string
                  description: Network Id
                name:
                  type: string
                  description: Network name
              required:
                - id
                - name
            host:
              type: string
              description: Application host
            port:
              oneOf:
                - type: integer
                  minimum: 1
                  maximum: 65353
                - type: string
                  minLength: 1
              description: Application port
          required:
            - network
            - host
            - port
    ApplicationsListResponse:
      type: array
      description: List of retrieved applications
      items:
        $ref: '#/components/schemas/ApplicationsListObject'
    ApplicationsListPaginatedResponse:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/ApplicationsListResponse'
        page:
          type: integer
          description: Current page number
        totalPage:
          type: integer
          description: Number of all pages
        itemsTotal:
          type: integer
          description: Number of all items
    CIDR:
      type: string
      pattern: '^((?:25[0-5]|2[0-4]\d|1\d\d|[1-9]\d|\d)(?:\.(?:25[0-5]|2[0-4]\d|1\d\d|[1-9]\d|\d)){3})(\/(3[0-2]|[1-2][0-9]|[0-9]))$'
    FQDN:
      type: string
      pattern: (?=^.{4,253}$)(^((?!-)[a-zA-Z0-9-]{0,62}[a-zA-Z0-9]\.)+[a-zA-Z]{2,63}$)
    FixedHost:
      type: object
      description: Application host fixed data
      properties:
        source:
          type: string
          description: Application host source
          enum:
            - fixed
        value:
          oneOf:
            - allOf:
                - $ref: '#/components/schemas/FQDN'
                - description: Application host FQDN
                - example: example.com
            - allOf:
                - $ref: '#/components/schemas/IP'
                - type: string
                  pattern: ^(?!0\.0\.0\.0$)(?!127\.)(?!localhost$)
                - description: Application host IP, but not localhost
                - example: 10.0.0.1
      required:
        - source
        - value
    IdpHost:
      type: object
      description: Application host idp data
      properties:
        source:
          type: string
          description: Application host source
          enum:
            - idp
        value:
          type: string
          description: Application host value
          pattern: ^[a-zA-Z0-9_.-]{2,255}$
          example: idpExample
      required:
        - source
        - value
    FixedPort:
      type: object
      description: Application port fixed data
      properties:
        source:
          type: string
          description: Application port source
          enum:
            - fixed
        value:
          allOf:
            - $ref: '#/components/schemas/PortNumber'
            - description: Application port value
            - example: 443
      required:
        - source
        - value
    IdpPort:
      type: object
      description: Application port idp data
      properties:
        source:
          type: string
          description: Application port source
          enum:
            - idp
        value:
          type: string
          description: Application port value
          pattern: ^[a-zA-Z0-9_.-]{2,255}$
          example: idpExample
      required:
        - source
        - value
    CommonCreateApplication:
      type: object
      properties:
        name:
          type: string
          description: Application name
          minLength: 5
          maxLength: 32
          pattern: ^[^~`()!#$%^&*+=[]\';,/{}|":<>?№@]+$
          example: MyApplication
        type:
          type: string
          description: Application type
          enum:
            - http
            - https
            - rdp
        network:
          allOf:
            - $ref: '#/components/schemas/Alphanumeric'
            - description: Application network ID. To get the ID use endpoint '/networks' with [network:read] permission.
            - example: ZwAeo5wqiF
        host:
          oneOf:
            - $ref: '#/components/schemas/FixedHost'
            - $ref: '#/components/schemas/IdpHost'
        port:
          oneOf:
            - $ref: '#/components/schemas/FixedPort'
            - $ref: '#/components/schemas/IdpPort'
        users:
          type: array
          description: List of IDs of assigned users. To get the IDs use endpoint '/users' with [user:read] permission.
          minItems: 1
          example:
            - mWKM26JMc1
            - mWKM26JMc2
          items:
            $ref: '#/components/schemas/AlphanumericWithSpace'
        groups:
          type: array
          description: List of IDs of assigned groups. To get the IDs use endpoint '/groups' with [group:read] permission.
          minItems: 1
          example:
            - mWKM26JMc1
            - mWKM26JMc2
          items:
            $ref: '#/components/schemas/AlphanumericWithSpace'
      required:
        - name
        - type
        - network
        - host
        - port
      oneOf:
        - properties:
            users:
              type: array
          required:
            - users
        - properties:
            groups:
              type: array
          required:
            - groups
    WebCreateApplication:
      allOf:
        - $ref: '#/components/schemas/CommonCreateApplication'
        - type: object
          properties:
            headers:
              type: object
              description: Application specific headers. Keys must not contain . and $
              pattern: ^[^.$]+$
              example:
                X-Custom-Header: value
          required:
            - headers
    HttpAttributes:
      type: object
      description: HTTP Application attributes
      properties:
        checkStatus:
          type: integer
          default: 200
        checkPath:
          type: string
          default: ''
          example: checkPath
        startRelativePath:
          type: string
          default: ''
          pattern: ^$|^\/[\w\d-._~!$&'()*+,;=:@/?#%]+$
          example: /startRelativePath
    HttpCreateApplication:
      allOf:
        - $ref: '#/components/schemas/WebCreateApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/HttpAttributes'
          required:
            - attributes
    HttpsAttributes:
      allOf:
        - $ref: '#/components/schemas/HttpAttributes'
        - type: object
          description: HTTPS Application attributes
          properties:
            sslCertificateVerification:
              type: boolean
              default: true
    HttpsCreateApplication:
      allOf:
        - $ref: '#/components/schemas/WebCreateApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/HttpsAttributes'
          required:
            - attributes
    RdpAttributes:
      type: object
      description: RDP Application attributes
      properties:
        clientType:
          type: string
          description: RDP client type
          default: web
          enum:
            - web
            - native
        disableClipboard:
          type: boolean
          default: false
        disablePrinting:
          type: boolean
          default: false
        ignoreTLSVerification:
          type: boolean
          default: true
        adminConsole:
          type: boolean
          default: false
        maxConnections:
          oneOf:
            - type: integer
              minimum: 1
              maximum: 1024
              default: 32
              description: Maximum connections value for Web client
            - type: integer
              minimum: 1
              maximum: 1
              default: 1
              description: Maximum connections value for Native client
        rdpSecurity:
          oneOf:
            - type: string
              enum:
                - any
                - nla
                - nla-ext
                - tls
                - vmconnect
                - rdp
              default: any
              description: Security mode for Web client
            - type: string
              enum:
                - any
              default: any
              description: Security mode for Native client
        enableMultiMonitors:
          type: boolean
    ApplicationAuth:
      type: object
      description: Authentication settings related to the application
      properties:
        authEnabled:
          type: boolean
        authUsername:
          type: string
          minLength: 1
        authPassword:
          type: string
          minLength: 1
        authDomain:
          type: string
          pattern: ^(?!:\/\/)([a-zA-Z0-9-_]+\.)*[a-zA-Z0-9][a-zA-Z0-9-_]*\.[a-zA-Z0-9]{2,11}?$
          example: domain.com
      required:
        - authEnabled
    RdpCreateApplication:
      allOf:
        - $ref: '#/components/schemas/CommonCreateApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/RdpAttributes'
            auth:
              $ref: '#/components/schemas/ApplicationAuth'
          required:
            - attributes
            - auth
    ApplicationAlias:
      type: object
      description: URL alias settings to access the application via a user-friendly URL under your own domain
      properties:
        aliasEnabled:
          type: boolean
        cname:
          type: string
          minLength: 1
        sslCertificate:
          type: string
          minLength: 1
      required:
        - aliasEnabled
    ApplicationHost:
      type: object
      description: Application host settings
      properties:
        value:
          type: string
          minLength: 1
        source:
          type: string
          minLength: 1
      required:
        - value
        - source
    ApplicationPort:
      type: object
      description: Application port settings
      properties:
        value:
          oneOf:
            - type: integer
              minimum: 1
              maximum: 65353
            - type: string
              minLength: 1
        source:
          type: string
          minLength: 1
      required:
        - value
        - source
    BasicApplication:
      allOf:
        - $ref: '#/components/schemas/CommonApplication'
        - type: object
          properties:
            network:
              type: object
              description: Application related Network data
              properties:
                id:
                  type: string
                  description: Network Id
                name:
                  type: string
                  description: Network name
                dns:
                  type: string
                  description: DNS of the network
                subnet:
                  type: string
                  description: Subnet of the network
              required:
                - id
                - name
            icon:
              type: object
              description: Application icon
              properties:
                name:
                  type: string
                  description: Icon name
                url:
                  type: string
                  description: Icon URL
            users:
              type: array
              description: List of IDs of assigned users
              items:
                type: object
                description: Application users
                properties:
                  id:
                    type: string
                    description: Unique User ID
                  fullName:
                    type: string
                    description: User's firstname and lastname
                  username:
                    type: string
                    description: User's username
            groups:
              type: array
              description: List of IDs of assigned groups
              items:
                type: object
                description: Application groups
                properties:
                  id:
                    type: string
                    description: Unique Group ID
                  name:
                    type: string
                    description: Group's name
            auth:
              $ref: '#/components/schemas/ApplicationAuth'
            alias:
              $ref: '#/components/schemas/ApplicationAlias'
            displayIconAtLogin:
              type: boolean
              description: Determines if the application icon is displayed during user login
            fqdn:
              type: string
              minLength: 1
              description: Fully qualified domain name (FQDN) associated with the application
            host:
              $ref: '#/components/schemas/ApplicationHost'
            port:
              $ref: '#/components/schemas/ApplicationPort'
            updatedAt:
              type: string
              description: Application update date
          required:
            - network
            - auth
            - alias
            - displayIconAtLogin
            - fqdn
            - host
            - port
    WebApplication:
      allOf:
        - $ref: '#/components/schemas/BasicApplication'
        - type: object
          properties:
            headers:
              type: object
              description: Web Application headers
    HttpApplication:
      allOf:
        - $ref: '#/components/schemas/WebApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/HttpAttributes'
    HttpsApplication:
      allOf:
        - $ref: '#/components/schemas/WebApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/HttpsAttributes'
    RdpApplication:
      allOf:
        - $ref: '#/components/schemas/BasicApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/RdpAttributes'
    SshAttributes:
      type: object
      description: SSH Application attributes
      properties:
        maxConnections:
          type: integer
      required:
        - maxConnections
    SshApplication:
      allOf:
        - $ref: '#/components/schemas/BasicApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/SshAttributes'
    VncAttributes:
      type: object
      description: VNC Application attributes
      properties:
        maxConnections:
          type: integer
        disableClipboard:
          type: boolean
      required:
        - maxConnections
    VncApplication:
      allOf:
        - $ref: '#/components/schemas/BasicApplication'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/VncAttributes'
    ApplicationStatusResponse:
      type: object
      properties:
        completed:
          type: boolean
          description: Shows whether the operation is completed
        result:
          type: object
          properties:
            statusCode:
              type: integer
              description: Response status code
            resource:
              type: string
              description: Endpoint to get the resource if exists
            reason:
              type: array
              description: Failure reasons
              items:
                type: string
    PeakBandwidth:
      type: integer
      description: Expected peak throughput of the tunnel communication in Mbps. Typical connection will be of 1000Mbps.
      minimum: 10
      maximum: 8000
      default: 1000
    RoutingType:
      type: string
      description: Routing mode for the tunnel
      enum:
        - route
        - policy
      default: route
    RoutingTypeUpdate:
      type: string
      description: Routing mode for the tunnel
      enum:
        - route
        - policy
    ScaleUnitsCount:
      type: integer
      description: |
        Number of scale units for the region. Scale units determine the capacity and performance level of the enhanced region.
        Higher values provide greater throughput and connection capacity.
      minimum: 1
      maximum: 10
    Attributes:
      type: object
      properties:
        splitTunneling:
          type: object
          properties:
            enabled:
              type: boolean
        customDNS:
          type: object
          properties:
            enabled:
              type: boolean
        networkController:
          type: object
          properties:
            enabled:
              type: boolean
        dnsFiltering:
          type: object
          properties:
            enabled:
              type: boolean
        openVPNTCP:
          type: object
          properties:
            enabled:
              type: boolean
      additionalProperties: false

    NetworkCustomerCertificateResponse:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            description: Certificate ID
          displayName:
            type: string
            description: Certificate display name
          expiresAt:
            type: string
            format: date-time
            description: Certificate expiration date
        required:
          - id
          - displayName
          - expiresAt

    HealthStatus:
      type: string
      enum:
        - passing
        - critical
        - unknown
      description: Health status of the component

    StandardHealthCheckType:
      type: string
      enum:
        - gateway
        - tunnel
      description: Type of health check component for standard networks

    EnhancedHealthCheckType:
      type: string
      enum:
        - tunnel
      description: Type of health check component for enhanced networks (tunnel only)

    StandardHealthCheckMeta:
      type: object
      properties:
        networkId:
          type: string
          description: ID of the network
        instanceId:
          type: string
          description: ID of the instance (gateway or tunnel)
        tunnelName:
          type: string
          description: Name of the tunnel (only for tunnel type)
      required:
        - networkId
        - instanceId
      additionalProperties: false

    EnhancedHealthCheckMeta:
      type: object
      properties:
        networkId:
          type: string
          description: ID of the network
        tunnelName:
          type: string
          description: Name of the tunnel
        tunnelId:
          type: string
          description: ID of the tunnel
        regionId:
          type: string
          description: ID of the region where the tunnel is deployed
      required:
        - networkId
        - tunnelName
        - tunnelId
        - regionId
      additionalProperties: false

    StandardHealthCheck:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/StandardHealthCheckType'
        meta:
          $ref: '#/components/schemas/StandardHealthCheckMeta'
        status:
          $ref: '#/components/schemas/HealthStatus'
      required:
        - type
        - meta
        - status
      additionalProperties: false

    EnhancedHealthCheck:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/EnhancedHealthCheckType'
        meta:
          $ref: '#/components/schemas/EnhancedHealthCheckMeta'
        status:
          $ref: '#/components/schemas/HealthStatus'
      required:
        - type
        - meta
        - status
      additionalProperties: false

    StandardHealthResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/StandardHealthCheck'
          description: List of health checks for standard networks (includes gateways and tunnels)
      required:
        - data
      additionalProperties: false

    EnhancedHealthResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/EnhancedHealthCheck'
          description: List of health checks for enhanced networks (tunnels only)
      required:
        - data
      additionalProperties: false

