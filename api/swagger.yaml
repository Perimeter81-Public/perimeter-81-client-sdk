          description: "Forbidden"
        "409":
          description: "Conflict - You cannot delete an address that is associated with one or more policies"
      tags:
        - Objects Addresses

  /v2.3/objects/services:
    get:
      operationId: getObjectsServices
      summary: Get object services
      description: 'Required permissions: `["objects:read"]`.'
      responses:
        '200':
          description: Completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ObjectsServicesResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      tags:
        - Objects Services
    post:
      operationId: postObjectsServices
      summary: Create new Service object
      description: 'Required permission: `["objects:create"]`.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectsServicesRequestObj'
      responses:
        '201':
          description: Created successfully
          content:
            application/json:
              schema:
                allOf:
                  - type: object
                    properties:
                      id:
                        type: string
                  - $ref: '#/components/schemas/ObjectsServicesResponseObj'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      tags:
        - Objects Services
  /v2.3/objects/services/{objectId}:
    put:
      operationId: putObjectsServices
      summary: Update Service object
      description: 'Required permission: `["objects:update"]`'
      parameters:
        - name: objectId
          required: true
          in: path
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectsServicesRequestObj'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ObjectsServicesResponseObj'
                  - description: The updated service.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict - You cannot update a service that is associated with one or more policies
      tags:
        - Objects Services
    delete:
      operationId: deleteObjectsServices
      summary: Delete Service object
      description: 'Required permission: `["objects:delete"]`'
      parameters:
        - name: objectId
          required: true
          in: path
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          description: Conflict - You cannot delete a service that is associated with one or more policies
      tags:
        - Objects Services
  /v2.3/applications:
    get:
      tags:
        - Application
      summary: Get Applications List
      description: This GET API will retrieve a list of all applications. Required permissions [application:read]
      operationId: getApplications
      parameters:
        - name: name
          in: query
          required: false
          description: Application name to filter
          schema:
            type: string
        - name: host
          in: query
          required: false
          description: Application host to filter
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: Application type to filter
          schema:
            type: string
            example: http
            enum:
              - http
              - https
              - rdp
              - ssh
              - vnc
        - name: page
          in: query
          required: false
          description: Specifies the current page of the paginated result set
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Defines the number of results per page
          schema:
            type: integer
        - name: sort
          in: query
          required: false
          description: Sorts the results based on a specified field and order. Available fields for sorting are name, host and type.
          schema:
            type: string
            example: sort[name]=asc
      responses:
        '200':
          description: Applications list retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationsListPaginatedResponse'
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
    post:
      tags:
        - Application
      summary: Create Application
      description: This POST API will allow to create a new application. Required permissions [application:create]
      operationId: createApplication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/HttpCreateApplication'
                - $ref: '#/components/schemas/HttpsCreateApplication'
                - $ref: '#/components/schemas/RdpCreateApplication'
      responses:
        '202':
          description: Application created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncOperationResponse'
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
  /v2.3/applications/{applicationId}:
    get:
      tags:
        - Application
      summary: Get Application by Id
      description: This GET API will allow to retrieve detailed information for a specific application by Id. Required permissions [application:read]
      operationId: getApplicationById
      parameters:
        - name: applicationId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Application retrieved successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/HttpApplication'
                  - $ref: '#/components/schemas/HttpsApplication'
                  - $ref: '#/components/schemas/RdpApplication'
                  - $ref: '#/components/schemas/SshApplication'
                  - $ref: '#/components/schemas/VncApplication'
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '404':
          description: Application Not Found
        '500':
          description: Internal Server Error
  /v2.3/applications/status/{statusId}:
    get:
      tags:
        - Application
      summary: Get status of Application creation process by statusId
      description: This endpoint should retrieve status of creating application process using statusId. Required permissions [application:read]
      operationId: getApplicationStatus
      parameters:
        - name: statusId
          required: true
          in: path
          schema:
            type: string
      responses:
        '200':
          description: Application was created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationStatusResponse'
        '400':
          description: Bad Request
        '401':
          description: Not Authorized
        '403':
          description: Forbidden
        '404':
          description: Application Not Found
        '500':
          description: Internal Server Error

components:
  securitySchemes:
    bearer:
      scheme: bearer
      bearerFormat: JWT
      type: http
  schemas:
    BaseDates:
      type: object
      properties:
        createdAt:
          format: date-time
          type: string
          description: The date when this record was created.
        updatedAt:
          format: date-time
          type: string
          description: The date of last update of the record.
      required:
        - createdAt
      additionalProperties: false
    ASN:
      type: integer
      description: Autonomous System Number (ASN) for BGP routing. It will be automatically assigned an ASN once creating the first dynamic tunnel in this network. The network ASN can never be changed once it is set.
      oneOf:
        - minimum: 1
          maximum: 64496
          description: Public ASN range
        - minimum: 64512
          maximum: 65535
          description: Private ASN range (16-bit)
        - minimum: 131072
          maximum: 4294967295
          description: Private ASN range (32-bit)
    TunnelAuthConfig:
      type: object
      properties:
        authType:
          type: string
          enum: [psk, cert]
          description: Authentication type for tunnel (psk for pre-shared key, cert for certificate)
        passphrase:
          type: string
          minLength: 8
          maxLength: 64
          description: Pre-shared key for tunnel authentication (8-64 characters). Required when authType is psk.
        customerRootCA:
          type: string
          description: Customer root certificate authority. Required when authType is cert.
    BasicNetwork:
      allOf:
        - $ref: '#/components/schemas/BaseDates'
        - type: object
          properties:
            dns:
              type: string
              description: DNS of the network.
            subnet:
              type: string
              description: Subnet of the network.
            accessType:
              enum:
                - public
                - private
              type: string
            applications:
              items:
                type: string
              type: array
              description: List of IDs of assigned applications.
            tags:
              items:
                type: string
              type: array
              description: List of network tags.
            name:
              type: string
              description: Network name.
            isDefault:
              type: boolean
              description: Indicates that the network is default.
            id:
              type: string
              description: Unique ID.
            tenantId:
              type: string
              description: ID of the tenant.
            asn:
              $ref: '#/components/schemas/ASN'
          required:
            - dns
            - subnet
            - accessType
            - applications
            - tags
            - name
            - isDefault
            - id
            - tenantId
    EnhancedNetwork:
      allOf:
        - $ref: '#/components/schemas/BasicNetwork'
        - type: object
          properties:
            attributes:
              $ref: '#/components/schemas/Attributes'
    Error:
      type: object
      properties:
        id:
          type: string
        message:
          type: string
    EnhancedRegionCreate:
      type: object
      properties:
        harmonySaseRegionId:
          type: string
          description: Harmony SASE region ID, Take id from GET Harmony sases regions endpoint (/networks/enhanced/harmony-sase-regions).
        scaleUnits:
          allOf:
            - $ref: '#/components/schemas/ScaleUnitsCount'
            - default: 1
        idle:
          type: boolean
          description: Region is disabled for users if true
          default: true
      required:
        - harmonySaseRegionId
    DeployEnhancedNetwork:
      type: object
      properties:
        network:
          type: object
          properties:
            subnet:
              type: string
              maxLength: 20
              description: Subnet of the network. Cannot be changed later. Allowed private subnet ranges are 10.0.0.0/12-22, 172.16.0.0/12-22, 192.168.0.0/16-22, or 198.18.0.0/15-22.
              default: '10.255.0.0/16'
            name:
              type: string
              description: Network name.
              minLength: 5
              maxLength: 32
            tags:
              type: array
              items:
                type: string
              description: List of network tags.
          required:
            - name
        regions:
          type: array
          items:
            $ref: '#/components/schemas/EnhancedRegionCreate'
          minItems: 1
      required:
        - network
        - regions
    AsyncOperationResponse:
      type: object
      properties:
        statusUrl:
          type: string
        samplingTime:
          type: integer
    OpenVPNAsyncOperationResponse:
      type: object
      properties:
        statusUrl:
          type: string
        samplingTime:
          type: integer
        secretAccessKey:
          type: string
          description: "Secret access key to download OpenVPN configuration file. This key will be shown only once in the response for security reasons. Make sure to store it securely."
    EnhancedNetworkUpdate:
      type: object
      properties:
        network:
          type: object
          properties:
            name:
              type: string
              description: Network name.
              minLength: 5
              maxLength: 32
            tags:
              type: array
              items:
                type: string
              description: List of network tags.
    HarmonySaseRegionsList:
      type: array
      items:
        allOf:
          - $ref: '#/components/schemas/HarmonySaseRegion'
          - description: List of Harmony SASE regions.
    HarmonySaseRegion:
      type: object
      properties:
        id:
          type: string
          description: ID for the Harmony SASE region.
        objectId:
          type: string
          description: Alias of id
        displayName:
          type: string
        name:
          type: string
          description: Name of the Harmony SASE region.
        countryCode:
          type: string
          description: ISO 3166-1 alpha-2 country code for the region.
        continentCode:
          type: string
          description: ISO 3166-1 alpha-2 continent code for the region.
      required:
        - id
        - displayName
        - name
        - countryCode
        - continentCode
    EnhancedRegion:
      type: object
      properties:
        id:
          type: string
          description: ID for the enhanced region.
        tenantId:
          type: string
          description: ID of the tenant that owns the region.
        name:
          type: string
        dns:
          type: string
        network:
          type: string
        scaleUnits:
          $ref: '#/components/schemas/ScaleUnitsCount'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        attributes:
          type: object
          properties:
            runningMode:
              type: object
              properties:
                idle:
                  type: boolean
                  description: Indicates if the region is currently active or disabled
              required:
                - idle
            edge:
              type: object
              properties:
                addresses:
                  type: array
                  items:
                    type: string
                    format: ipv4
                  description: Array of IP addresses for the edge
                globalIPs:
                  type: array
                  items:
                    type: string
                    format: ipv4
                  description: Array of Global IP addresses for the edge
              required:
                - addresses
      required:
        - id
        - tenantId
        - dns
        - network
        - name
        - scaleUnits
        - createdAt
        - attributes
    ScaleUnitsOperation:
      type: object
      properties:
        unitType:
          type: string
          description: Type of scale unit. Standard units provide basic capacity, while cloudSecurity units offer enhanced security features.
          enum:
            - standard
            - cloudSecurity
        scaleUnitsCount:
          $ref: '#/components/schemas/ScaleUnitsCount'
        idle:
          type: boolean
          description: Region is disabled for users if true
          default: true
      required:
        - unitType
        - scaleUnitsCount
    DynamicTunnelDetails:
      type: object
      properties:
        regionID:
          type: string
          description: Dynamic tunnel enhanced region ID
      allOf:
        - $ref: '#/components/schemas/TunnelAuthConfig'
        - type: object
          properties:
            p81GWInternalIP:
              type: string
              format: ipv4
              description: Harmony Sase gateway internal IP address
            remoteGWInternalIP:
              type: string
              format: ipv4
              description: Remote gateway internal IP address
            remotePublicIP:
              type: string
              format: ipv4
              description: Remote gateway public IP address
            remoteASN:
              $ref: '#/components/schemas/ASN'
            remoteID:
              type: string
              description: Remote gateway ID
            routingType:
              $ref: '#/components/schemas/RoutingType'
      required:
        - regionID
        - authType
        - p81GWInternalIP
        - remoteGWInternalIP
        - remotePublicIP
        - remoteASN
        - remoteID
        - routingType
    DynamicTunnelDetailsUpdate:
      allOf:
        - $ref: '#/components/schemas/TunnelAuthConfig'
        - type: object
          properties:
            remotePublicIP:
              type: string
              format: ipv4
              description: Remote gateway public IP address
            remoteASN:
              $ref: '#/components/schemas/ASN'
            remoteID:
              type: string
              description: Remote gateway ID
            routingType:
              $ref: '#/components/schemas/RoutingTypeUpdate'
    IPSecSharedSettingsUpdate:
      type: object
      properties:
        p81GatewaySubnets:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Harmony Sase gateway ID
        remoteGatewaySubnets:
          type: array
          items:
            type: string
          minItems: 1
          uniqueItems: true
          description: Remote gateway subnets

    Lifetime:
      type: string
      pattern: ^((1[0-9]|[2-9][0-9]|[1-9][0-9]{2,3}|[1-7][0-9]{4}|8[0-5][0-9]{3}|86[0-3][0-9]{2}|86400)s)|(([1-9]|[1-9][0-9]|[1-9][0-9][0-9]|1[0-3][0-9][0-9]|14[0-3][0-9]|1440)m)|(([1-9]|1[0-9]|2[0-4])h)$
    DPDTime:
      type: string
      pattern: ^([5-9]|[1-5][0-9]|60)s$
    IPSecAlgorithms:
      type: object
      properties:
        auth:
          minLength: 1
          uniqueItems: true
          type: array
          items:
            type: string
            enum:
              - md5
              - sha1
              - sha384
              - sha256
              - sha512
              - aesxcbc
              - aescmac
              - prfmd5
              - prfsha1
              - prfaesxcbc
              - prfaescmac
              - prfsha256
              - prfsha384
              - prfsha512
        encryption:
          minLength: 1
          uniqueItems: true
          type: array
          items:
            type: string
            enum:
              - 3des
              - blowfish128
              - blowfish192
              - blowfish256
              - aes128
              - aes192
              - aes256
              - aes128ctr
              - aes192ctr
              - aes256ctr
              - camellia128
              - camellia192
              - camellia256
              - camellia128ctr
              - camellia192ctr
              - camellia256ctr
              - aes128ccm8
              - aes192ccm8
              - aes256ccm8
              - aes128ccm16
              - aes192ccm16
              - aes256ccm16
              - aes128gcm8
              - aes192gcm8
              - aes256gcm8
              - aes128gcm16
              - aes192gcm16
              - aes256gcm16
              - camellia128ccm16
              - camellia192ccm16
              - camellia256ccm16
              - chacha20poly1305
    IPSecPhaseCommon:
      type: object
      properties:
        dh:
          description: Diffie Helman encryption
          minLength: 0
          uniqueItems: true
          type: array
          items:
            type: integer
            enum:
              - 2
              - 5
              - 14
              - 19
              - 20
              - 21
              - 31
      required:
        - auth
        - encryption
        - dh
      additionalProperties: false
    IPSecPhaseConfig:
      allOf:
        - $ref: '#/components/schemas/IPSecAlgorithms'
        - $ref: '#/components/schemas/IPSecPhaseCommon'
    IPSecAdvancedSettings:
      type: object
      properties:
        keyExchange:
          type: string
          enum:
            - ikev1
            - ikev2
        ikeLifeTime:
          $ref: '#/components/schemas/Lifetime'
        lifetime:
          $ref: '#/components/schemas/Lifetime'
        dpdDelay:
          $ref: '#/components/schemas/DPDTime'
        dpdTimeout:
          $ref: '#/components/schemas/DPDTime'
        phase1:
          $ref: '#/components/schemas/IPSecPhaseConfig'
        phase2:
          $ref: '#/components/schemas/IPSecPhaseConfig'
      required:
        - keyExchange
        - ikeLifeTime
        - lifetime
        - dpdDelay
        - dpdTimeout
        - phase1
        - phase2
      additionalProperties: false
    IPSecAdvancedSettingsUpdate:
      type: object
      properties:
        keyExchange:
          type: string
          enum:
            - ikev1
            - ikev2
        ikeLifeTime:
          $ref: '#/components/schemas/Lifetime'
        lifetime:
          $ref: '#/components/schemas/Lifetime'
        dpdDelay:
          $ref: '#/components/schemas/DPDTime'
        dpdTimeout:
          $ref: '#/components/schemas/DPDTime'
        phase1:
          $ref: '#/components/schemas/IPSecPhaseConfig'
        phase2:
          $ref: '#/components/schemas/IPSecPhaseConfig'
      additionalProperties: false
    IPSecPhaseCommonV2_3:
      type: object
      properties:
        keyExchangeMethod:
          description: Key exchange method encryption
          minLength: 0
          uniqueItems: true
          type: array
          items:
            type: string
            enum:
              - modp1024
              - modp1536
              - modp2048
              - ecp256
              - ecp384
              - ecp521
              - curve25519
      required:
        - auth
        - encryption
        - keyExchangeMethod
      additionalProperties: false
    IPSecPhaseConfigV2_3:
      allOf:
        - $ref: '#/components/schemas/IPSecAlgorithms'
        - $ref: '#/components/schemas/IPSecPhaseCommonV2_3'
    IPSecAdvancedSettingsV2_3:
      type: object
      properties:
        keyExchange:
          type: string
          enum:
            - ikev1
            - ikev2
        ikeLifeTime:
          $ref: '#/components/schemas/Lifetime'
        lifetime:
          $ref: '#/components/schemas/Lifetime'
        dpdDelay:
          $ref: '#/components/schemas/DPDTime'
        dpdTimeout:
          $ref: '#/components/schemas/DPDTime'
        phase1:
          $ref: '#/components/schemas/IPSecPhaseConfigV2_3'
        phase2:
          $ref: '#/components/schemas/IPSecPhaseConfigV2_3'
      required:
        - keyExchange
        - ikeLifeTime
        - lifetime
        - dpdDelay
        - dpdTimeout
        - phase1
        - phase2
      additionalProperties: false
    IPSecAdvancedSettingsUpdateV2_3:
      type: object
      properties:
        keyExchange:
          type: string
          enum:
            - ikev1
            - ikev2
        ikeLifeTime:
          $ref: '#/components/schemas/Lifetime'
        lifetime:
          $ref: '#/components/schemas/Lifetime'
        dpdDelay:
          $ref: '#/components/schemas/DPDTime'
        dpdTimeout:
          $ref: '#/components/schemas/DPDTime'
        phase1:
          $ref: '#/components/schemas/IPSecPhaseConfigV2_3'
        phase2:
          $ref: '#/components/schemas/IPSecPhaseConfigV2_3'
      additionalProperties: false
    NetworkFeatures:
      type: object
      properties:
        cloudSecurity:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
          required:
            - enabled
        symmetricInnerMesh:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
          required:
            - enabled
        DNSServices:
          type: object
          properties:
            redirectToResolver:
              type: object
              properties:
                enabled:
                  type: boolean
                  default: true
              required:
                - enabled
          required:
            - redirectToResolver
    NetworkFeaturesCreate:
      allOf:
        - $ref: '#/components/schemas/NetworkFeatures'
        - required:
            - cloudSecurity
            - symmetricInnerMesh
            - DNSServices
    EnhancedTunnelBase:
      allOf:
        - $ref: '#/components/schemas/TunnelAuthConfig'
        - type: object
          properties:
            regionID:
              type: string
              description: Target region ID
            tunnelName:
              type: string
              description: Name of the static tunnel
            p81GatewaySubnets:
              type: array
              items:
                type: string
              minItems: 1
              description: Harmony Sase gateway subnets
            remoteGatewaySubnets:
              type: array
              items:
                type: string
              minItems: 1
              description: Remote gateway subnets
            keyExchange:
              type: string
              description: IKE version for key exchange
              enum:
                - ikev1
                - ikev2
              default: ikev2
            ikeLifeTime:
              $ref: '#/components/schemas/Lifetime'
            lifetime:
              $ref: '#/components/schemas/Lifetime'
            dpdDelay:
              $ref: '#/components/schemas/DPDTime'
            dpdTimeout:
              $ref: '#/components/schemas/DPDTime'
            phase1:
              $ref: '#/components/schemas/IPSecPhaseConfigV2_3'
            phase2:
              $ref: '#/components/schemas/IPSecPhaseConfigV2_3'
            remotePublicIP:
              type: string
              format: ipv4
              description: Remote gateway public IP address
            remoteID:
              type: string
              description: Remote gateway ID
            description:
              type: string
              description: Optional tunnel description
            features:
              $ref: '#/components/schemas/NetworkFeatures'
            routingType:
              $ref: '#/components/schemas/RoutingType'
            peakBandwidth:
              $ref: '#/components/schemas/PeakBandwidth'
          required:
            - regionID
            - tunnelName
            - p81GatewaySubnets
            - remoteGatewaySubnets
            - keyExchange
            - phase1
            - phase2
            - authType
            - remotePublicIP
            - remoteID
            - features
            - ikeLifeTime
            - lifetime
            - dpdDelay
            - dpdTimeout
    EnhancedTunnel:
      allOf:
        - $ref: '#/components/schemas/EnhancedTunnelBase'
        - type: object
          properties:
            id:
              type: string
              description: Enhanced tunnel ID
            haTunnelID:
              type: string
              description: Enhanced dynamic tunnel group ID (or tunnel ID for static tunnel)
            dpdAction:
              type: string
              description: Enhanced tunnel DPDTime actions.
          required:
            - id
            - haTunnelID
            - dpdAction
    DynamicTunnelCreate:
      type: object
      properties:
        tunnelName:
          type: string
          description: Name of the tunnel
        description:
          type: string
          description: Optional description for the tunnel
        tunnels:
          type: array
          description: List of tunnels
          items:
            $ref: '#/components/schemas/DynamicTunnelDetails'
          minItems: 1
          maxItems: 8
        sharedSettings:
