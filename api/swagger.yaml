openapi: 3.0.0
info:
  version: 2.3.0
  title: Harmony SASE Public API
  description: |
    The YAML for Harmony SASE Public API.
  contact: {}
servers:
  - description: SwaggerHub API Auto Mocking
    url: https://virtserver.swaggerhub.com/perimeter81/public-api-yaml/1.0.0
  - description: Harmony SASE API US
    url: https://api.perimeter81.com/api/rest
  - description: Harmony SASE API EU
    url: https://api.eu.sase.checkpoint.com/api/rest
  - description: Harmony SASE API Australia
    url: https://api.au.sase.checkpoint.com/api/rest
  - description: Harmony SASE API India
    url: https://api.in.sase.checkpoint.com/api/rest
security:
  - bearer: []
tags:
  - name: Enhanced Networks
    description: |
      The Enhanced Network API allows you to manage and configure enhanced networks.
  - name: Enhanced Regions
    description: |
      The Enhanced Region API allows you to manage and configure enhanced regions, including scale units.
  - name: Enhanced Tunnels
    description: |
      The Enhanced Tunnel API allows you to manage and configure enhanced tunnels.
  - name: Enhanced Route Tables
    description: |
      The Enhanced Route Tables API allows you to manage and configure enhanced route tables of static and dynamic tunnels.
  - name: Standard Networks
    description: |
      The Standard Network API allows you to manage and configure standard networks.
  - name: Gateways
  - name: Regions
  - name: Wireguard
  - name: OpenVPN
  - name: IPSec-Single
  - name: IPSec-Redundant
  - name: Firewall Policy
  - name: Route Table
  - name: Objects Services
  - name: Application
  - name: Networks
    description: |
      This API allows you to manage and configure standard networks using the old API and keep you BC.
paths:
  /v2.3/networks/enhanced:
    get:
      tags:
        - Enhanced Networks
      summary: Get all enhanced networks
      description: List all enhanced networks
      operationId: getEnhancedNetworks
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnhancedNetwork'
                description: Enhanced network list.
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
    post:
      tags:
        - Enhanced Networks
      summary: Create enhanced network
      description: Create a new enhanced network with regions
      operationId: createEnhancedNetwork
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeployEnhancedNetwork'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '402':
          $ref: '#/components/responses/402_Insufficient_licenses'
        '403':
          $ref: '#/components/responses/403_Forbidden'
  /v2.3/networks/enhanced/{networkId}:
    get:
      tags:
        - Enhanced Networks
      summary: Get enhanced network by ID
      description: Get a specific enhanced network
      operationId: getEnhancedNetwork
      parameters:
        - $ref: '#/components/parameters/networkId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedNetwork'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    put:
      tags:
        - Enhanced Networks
      summary: Update enhanced network
      description: Update an existing enhanced network
      operationId: updateEnhancedNetwork
      parameters:
        - $ref: '#/components/parameters/networkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhancedNetworkUpdate'
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedNetwork'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    delete:
      tags:
        - Enhanced Networks
      summary: Delete enhanced network
      description: Delete an enhanced network and all its resources
      operationId: deleteEnhancedNetwork
      parameters:
        - $ref: '#/components/parameters/networkId'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
  /v2.3/networks/enhanced/{networkId}/health:
    get:
      tags:
        - Enhanced Networks
      summary: Get enhanced network health status
      description: Get health status of all tunnels in the enhanced network.
      operationId: getEnhancedNetworkHealth
      parameters:
        - $ref: '#/components/parameters/networkId'
      responses:
        '200':
          description: Health status retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedHealthResponse'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
  /v2.3/networks/enhanced/harmony-sase-regions:
    get:
      operationId: Enhanced_NetworksControllerV2_getRegions
      summary: List of available Harmony SASE regions that supports enhanced networks
      description: 'Required permissions: `["addon:read"]`<br><br>List of regions.'
      parameters: []
      responses:
        '200':
          description: Completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HarmonySaseRegionsList'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      tags:
        - Enhanced Regions
  /v2.3/networks/enhanced/network-customer-certificate:
    get:
      operationId: Enhanced_NetworksControllerV2_3_getNetworkCustomerCertificate
      summary: Get network customer certificate
      description: 'Required permissions: `["network:read"]`<br><br>Get network customer certificate details.'
      parameters: []
      responses:
        '200':
          description: Completed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NetworkCustomerCertificateResponse'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
      tags:
        - Enhanced Networks
  /v2.3/networks/enhanced/{networkId}/regions:
    get:
      tags:
        - Enhanced Regions
      summary: List regions
      description: List all regions in an enhanced network
      operationId: listEnhancedRegions
      parameters:
        - $ref: '#/components/parameters/networkId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnhancedRegion'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
    post:
      tags:
        - Enhanced Regions
      summary: Create enhanced region
      description: Add a new region to an enhanced network
      operationId: createEnhancedRegion
      parameters:
        - $ref: '#/components/parameters/networkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhancedRegionCreate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '409':
          description: Network region doesn't exists
  /v2.3/networks/enhanced/{networkId}/regions/{regionId}:
    get:
      tags:
        - Enhanced Regions
      summary: Get region
      description: Get details of a specific region in an enhanced network
      operationId: getEnhancedRegion
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/regionId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedRegion'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    delete:
      tags:
        - Enhanced Regions
      summary: Delete enhanced region
      description: Remove a region from an enhanced network
      operationId: deleteEnhancedRegion
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/regionId'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '409':
          description: Network region doesn't exists
  /v2.3/networks/enhanced/{networkId}/regions/{regionId}/scale-unit/increase:
    put:
      tags:
        - Enhanced Regions
      summary: Increase scale units
      description: Increase the number of scale units in a region
      operationId: increaseScaleUnit
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/regionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScaleUnitsOperation'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '409':
          description: Network region not found
  /v2.3/networks/enhanced/{networkId}/regions/{regionId}/scale-unit/reduce:
    put:
      tags:
        - Enhanced Regions
      summary: Reduce scale units
      description: Reduce the number of scale units in a region
      operationId: reduceScaleUnit
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/regionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScaleUnitsOperation'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '409':
          description: Network region not found
  /v2.3/networks/enhanced/{networkId}/tunnels:
    get:
      tags:
        - Enhanced Tunnels
      summary: Get tunnels for a network
      description: List all tunnels in a specific enhanced network
      operationId: getEnhancedRegionTunnelsPerNetwork
      parameters:
        - $ref: '#/components/parameters/networkId'
        - name: page
          in: query
          required: false
          description: Specifies the current page of the paginated result set
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Defines the number of results per page
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnhancedTunnel'
                  itemsTotal:
                    type: number
                  page:
                    type: number
                  totalPage:
                    type: number
                required:
                  - data
                  - itemsTotal
                  - page
                  - totalPage
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'

  /v2.3/networks/enhanced/{networkId}/regions/{regionId}/tunnels:
    get:
      tags:
        - Enhanced Tunnels
      summary: Get tunnels for a region
      description: List all tunnels in a specific region of an enhanced network
      operationId: getEnhancedRegionTunnelsPerRegion
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/regionId'
        - name: page
          in: query
          required: false
          description: Specifies the current page of the paginated result set
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Defines the number of results per page
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnhancedTunnel'
                  itemsTotal:
                    type: number
                  page:
                    type: number
                  totalPage:
                    type: number
                required:
                  - data
                  - itemsTotal
                  - page
                  - totalPage
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
  /v2.3/networks/enhanced/{networkId}/tunnels/ipsec/dynamic:
    post:
      tags:
        - Enhanced Tunnels
      summary: Create dynamic IPSec tunnel
      description: Create a new dynamic IPSec tunnel in an enhanced network
      operationId: createDynamicTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DynamicTunnelCreate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '422':
          $ref: '#/components/responses/422_UnprocessableEntity'
  /v2.3/networks/enhanced/{networkId}/tunnels/ipsec/dynamic/{dynamicTunnelId}:
    get:
      tags:
        - Enhanced Tunnels
      summary: Get dynamic IPSec tunnel
      description: Get details of a dynamic IPSec tunnel
      operationId: getDynamicTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/dynamicTunnelId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnhancedTunnel'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    put:
      tags:
        - Enhanced Tunnels
      summary: Update dynamic IPSec tunnel
      description: Update a dynamic IPSec tunnel configuration
      operationId: updateDynamicTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/dynamicTunnelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DynamicTunnelUpdate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    delete:
      tags:
        - Enhanced Tunnels
      summary: Delete dynamic IPSec tunnel
      description: Delete a dynamic IPSec tunnel
      operationId: deleteDynamicTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/dynamicTunnelId'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '422':
          $ref: '#/components/responses/422_UnprocessableEntity'
  /v2.3/networks/enhanced/{networkId}/tunnels/ipsec/static:
    post:
      tags:
        - Enhanced Tunnels
      summary: Create static IPSec tunnel
      description: Create a new static IPSec tunnel in an enhanced network
      operationId: createStaticTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaticTunnelCreate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '422':
          $ref: '#/components/responses/422_UnprocessableEntity'
  /v2.3/networks/enhanced/{networkId}/tunnels/ipsec/static/{tunnelId}:
    get:
      tags:
        - Enhanced Tunnels
      summary: Get static IPSec tunnel
      description: Get details of a static IPSec tunnel
      operationId: getStaticTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/tunnelId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedTunnel'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    put:
      tags:
        - Enhanced Tunnels
      summary: Update static IPSec tunnel
      description: Update a static IPSec tunnel configuration
      operationId: updateStaticTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/tunnelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StaticTunnelUpdate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    delete:
      tags:
        - Enhanced Tunnels
      summary: Delete static IPSec tunnel
      description: Delete a static IPSec tunnel
      operationId: deleteStaticTunnel
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/tunnelId'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
        '422':
          $ref: '#/components/responses/422_UnprocessableEntity'
  /v2.3/networks/enhanced/{networkId}/route-table:
    get:
      tags:
        - Enhanced Route Tables
      summary: Get route table
      description: Get the complete route table for an enhanced network
      operationId: getEnhancedRouteTable
      parameters:
        - $ref: '#/components/parameters/networkId'
        - name: page
          in: query
          required: false
          description: Specifies the current page of the paginated result set
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          description: Defines the number of results per page
          schema:
            type: integer
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnhancedRouteTable'
                  itemsTotal:
                    type: number
                  page:
                    type: number
                  totalPage:
                    type: number
                required:
                  - data
                  - itemsTotal
                  - page
                  - totalPage
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
  /v2.3/networks/enhanced/{networkId}/route-table/static:
    post:
      tags:
        - Enhanced Route Tables
      summary: Create static route
      description: Create a new static route entry. The selected static tunnel must not already have a route table.
      operationId: createStaticRoute
      parameters:
        - $ref: '#/components/parameters/networkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhancedRouteTableStaticCreate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
  /v2.3/networks/enhanced/{networkId}/route-table/dynamic:
    post:
      tags:
        - Enhanced Route Tables
      summary: Create dynamic route
      description: Create a new dynamic route entry. The selected dynamic tunnel must not already have a route table.
      operationId: createDynamicRoute
      parameters:
        - $ref: '#/components/parameters/networkId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnhancedRouteTableDynamicCreate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
  /v2.3/networks/enhanced/{networkId}/route-table/{routeId}:
    get:
      tags:
        - Enhanced Route Tables
      summary: Get route entry
      description: Get a specific route entry
      operationId: getRouteEntry
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/routeId'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnhancedRouteTable'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    put:
      tags:
        - Enhanced Route Tables
      summary: Update route entry
      description: Update a specific route entry. Only non-propagated route tables can be edited.
      operationId: updateRouteEntry
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/routeId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RouteTableUpdate'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '400':
          $ref: '#/components/responses/400_BadRequest'
        '401':
          $ref: '#/components/responses/401_Unauthorized'
        '403':
          $ref: '#/components/responses/403_Forbidden'
        '404':
          $ref: '#/components/responses/404_NotFound'
    delete:
      tags:
        - Enhanced Route Tables
      summary: Delete route entry
      description: Delete a specific route entry. Only non-propagated route tables can be deleted.
      operationId: deleteRouteEntry
      parameters:
        - $ref: '#/components/parameters/networkId'
        - $ref: '#/components/parameters/routeId'
      responses:
        '202':
          $ref: '#/components/responses/202_Accepted'
        '401':
