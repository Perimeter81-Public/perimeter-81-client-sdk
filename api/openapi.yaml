        p81GWInternalIP: p81GWInternalIP
        remoteASN: null
        customerRootCA: customerRootCA
        routingType: route
        regionID: regionID
        remotePublicIP: remotePublicIP
        remoteGWInternalIP: remoteGWInternalIP
        passphrase: passphrase
        authType: psk
        remoteID: remoteID
      type: object
    DynamicTunnelDetailsUpdate:
