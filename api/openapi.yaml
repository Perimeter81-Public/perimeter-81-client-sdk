            - md5
            - sha1
            - sha384
            - sha256
            - sha512
            - aesxcbc
            - aescmac
            - prfmd5
            - prfsha1
            - prfaesxcbc
            - prfaescmac
            - prfsha256
            - prfsha384
            - prfsha512
            type: string
          minLength: 1
          type: array
          uniqueItems: true
        encryption:
          items:
            enum:
            - 3des
            - blowfish128
            - blowfish192
            - blowfish256
            - aes128
            - aes192
            - aes256
            - aes128ctr
            - aes192ctr
            - aes256ctr
            - camellia128
            - camellia192
            - camellia256
            - camellia128ctr
            - camellia192ctr
            - camellia256ctr
            - aes128ccm8
            - aes192ccm8
            - aes256ccm8
            - aes128ccm16
            - aes192ccm16
            - aes256ccm16
            - aes128gcm8
            - aes192gcm8
            - aes256gcm8
            - aes128gcm16
            - aes192gcm16
            - aes256gcm16
            - camellia128ccm16
            - camellia192ccm16
            - camellia256ccm16
            - chacha20poly1305
            type: string
          minLength: 1
          type: array
          uniqueItems: true
      type: object
    IPSecPhaseCommon:
      additionalProperties: false
      properties:
        dh:
          description: Diffie Helman encryption
          items:
            enum:
            - 2
            - 5
            - 14
            - 19
            - 20
            - 21
            - 31
            type: integer
          minLength: 0
          type: array
          uniqueItems: true
      required:
      - auth
      - dh
      - encryption
      type: object
    IPSecPhaseConfig:
      allOf:
      - $ref: "#/components/schemas/IPSecAlgorithms"
      - $ref: "#/components/schemas/IPSecPhaseCommon"
      example:
        encryption:
        - 3des
        - 3des
        dh:
        - 6
        - 6
        auth:
        - md5
        - md5
    IPSecAdvancedSettings:
      additionalProperties: false
      example:
        ikeLifeTime: ikeLifeTime
        phase1:
          encryption:
          - 3des
          - 3des
          dh:
          - 6
          - 6
          auth:
          - md5
          - md5
        phase2:
          encryption:
          - 3des
          - 3des
          dh:
          - 6
          - 6
          auth:
          - md5
          - md5
        dpdTimeout: dpdTimeout
        lifetime: lifetime
        dpdDelay: dpdDelay
        keyExchange: ikev1
      properties:
        keyExchange:
          enum:
          - ikev1
          - ikev2
